<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Form - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5" style="max-width: 500px;">
    <h1 th:text="${user.id == null} ? 'Add User' : 'Edit User'">User Form</h1>
    <form th:action="@{${user.id == null} ? '/admin/add' : '/admin/edit'}" method="post">
        <input type="hidden" th:if="${user.id != null}" th:name="id" th:value="${user.id}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" th:value="${user.username}">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="text" class="form-control" id="password" name="password" th:value="${user.password}">
        </div>
        <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" name="role" th:value="${user.role}">
                <option value="STUDENT" th:selected="${user.role=='STUDENT'}">Student</option>
                <option value="TEACHER" th:selected="${user.role=='TEACHER'}">Teacher</option>
                <option value="ADMIN" th:selected="${user.role=='ADMIN'}">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a th:href="@{/admin}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
