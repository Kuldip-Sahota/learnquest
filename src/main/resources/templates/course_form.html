<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Course - LearnQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <h1>Add a New Course</h1>

    <div th:if="${param.error == 'notauthorized'}" class="alert alert-danger">
        You are not authorized to access this page.
    </div>

    <form th:action="@{/courses/add}" th:object="${course}" method="post">
        <div class="mb-3">
            <label for="name" class="form-label">Course Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}">
            <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <input type="text" class="form-control" id="category" th:field="*{category}">
            <div class="text-danger" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <div class="mb-3">
            <label for="difficultyLevel" class="form-label">Difficulty Level (1-5)</label>
            <input type="number" class="form-control" id="difficultyLevel" th:field="*{difficultyLevel}">
            <div class="text-danger" th:if="${#fields.hasErrors('difficultyLevel')}" th:errors="*{difficultyLevel}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Add Course</button>
        <a th:href="@{/courses}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
