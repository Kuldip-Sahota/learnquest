<!DOCTYPE html> 
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Courses - LearnQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <h1>Courses</h1>

    <div th:if="${param.error == 'notauthorized'}" class="alert alert-danger">
        You are not authorized to perform this action.
    </div>

    <!-- FILTER FORM -->
    <form class="row g-3 mb-4" th:action="@{/courses}" method="get">
        <div class="col-md-4">
            <input type="text" class="form-control" name="category"
                   placeholder="Filter by category"
                   th:value="${category}">
        </div>

        <div class="col-md-4">
            <select class="form-select" name="difficultyLevel">
                <option value="0" th:selected="${difficultyLevel == 0}">All difficulty</option>
                <option value="1" th:selected="${difficultyLevel == 1}">1 - Easy</option>
                <option value="2" th:selected="${difficultyLevel == 2}">2</option>
                <option value="3" th:selected="${difficultyLevel == 3}">3 - Medium</option>
                <option value="4" th:selected="${difficultyLevel == 4}">4</option>
                <option value="5" th:selected="${difficultyLevel == 5}">5 - Hard</option>
            </select>
        </div>

        <div class="col-md-4">
            <button class="btn btn-primary">Filter</button>
        </div>
    </form>

    <!-- COURSES TABLE -->
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Difficulty</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="course : ${courses}" th:if="${courses != null}">
                <td th:text="${course.name}"></td>
                <td th:text="${course.category}"></td>
                <td th:text="${course.difficultyLevel}"></td>

                <td>

                    <!-- ENROLL (ANY LOGGED-IN USER) -->
                    <a th:if="${loggedInUser != null}"
                       th:href="@{'/enroll/' + ${course.id}}"
                       class="btn btn-primary btn-sm me-1">
                        Enroll
                    </a>

                    <!-- TEACHER VIEW SUBMISSIONS -->
                    <a th:if="${loggedInUser != null and loggedInUser.role == 'TEACHER'}"
                       th:href="@{'/submission/' + ${course.id}}"
                       class="btn btn-info btn-sm me-1">
                        View Work
                    </a>

                    <!-- UPLOAD (ONLY STUDENT) -->
                    <form th:if="${loggedInUser != null and loggedInUser.role == 'STUDENT'}"
                          th:action="@{'/submit/' + ${course.id}}"
                          method="post"
                          enctype="multipart/form-data"
                          style="display:inline">

                        <input type="file" name="file" required>

                        <button class="btn btn-warning btn-sm">
                            Upload
                        </button>
                    </form>

                </td>
            </tr>
        </tbody>
    </table>

    <!-- PAGINATION -->
    <nav th:if="${totalPages > 1}">
        <ul class="pagination">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/courses(page=${currentPage - 1}, category=${category}, difficultyLevel=${difficultyLevel})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:href="@{/courses(page=${i}, category=${category}, difficultyLevel=${difficultyLevel})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/courses(page=${currentPage + 1}, category=${category}, difficultyLevel=${difficultyLevel})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

    <!-- ADD COURSE BUTTON -->
    <a th:if="${loggedInUser != null and (loggedInUser.role == 'TEACHER' or loggedInUser.role == 'ADMIN')}"
       th:href="@{/courses/add}"
       class="btn btn-success mt-3">
        Add New Course
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
