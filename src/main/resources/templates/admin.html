<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - LearnQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">
    <h1>Admin Dashboard</h1>
    <p>Welcome, <span th:text="${currentUser.username}">Admin</span>!</p>

    <div class="mt-4">
        <h3>Manage Users</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}">username</td>
                    <td th:text="${user.role}">role</td>
                    <td>
                        <a th:href="@{'/admin/edit/' + ${user.id}}" class="btn btn-sm btn-warning">Edit</a>
                        <a th:href="@{'/admin/delete/' + ${user.id}}" class="btn btn-sm btn-danger"
                           onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <a th:href="@{/admin/add}" class="btn btn-primary">Add New User</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
